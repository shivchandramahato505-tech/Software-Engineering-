<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quick Note Taker</title>

    <style>
        body {
            margin: 0;
            padding: 20px;
            font-family: Arial, sans-serif;
            background: #f4f4f4;
        }
        
        h1 {
            margin-bottom: 15px;
            color: #222;
        }
        
        textarea {
            width: 100%;
            height: 60vh;
            padding: 15px;
            font-size: 18px;
            resize: none;
            border: 1px solid #ccc;
            border-radius: 8px;
            box-sizing: border-box;
        }
        
        .buttons {
            margin-top: 15px;
        }
        
        button {
            padding: 12px 18px;
            font-size: 15px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            margin-right: 10px;
            margin-bottom: 10px;
            background: #316357;
            color: white;
        }
        
        button:hover {
            opacity: 0.9;
        }
        
        #status {
            margin-top: 10px;
            color: gray;
            font-size: 14px;
        }
    </style>
</head>

<body>

    <h1>📝 Quick Note Taker</h1>

    <textarea id="note" placeholder="Start typing your note..."></textarea>

    <div class="buttons">
        <button id="new-note" type="button">🆕 New Note</button>
        <button id="open-file" type="button">📂 Open File</button>
        <button id="save-as" type="button">💾 Save As</button>
        <button id="save" type="button">💾 Save</button>
    </div>

    <p id="status">Ready...</p>

    <!-- ✅ IMPORTANT: match your actual file name -->
    <script src="./render.js"></script>

</body>

</html>
